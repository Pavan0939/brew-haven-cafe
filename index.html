<!DOCTYPE html>
<html>
<head>
<title>Brew Haven Cafe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family:Poppins, sans-serif;
    background:#121212;
    color:#fff;
}

/* HERO */
.hero {
    height:320px;
    background:url('https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?w=1600') center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}
.hero::after {
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}
.hero h1 {
    position:relative;
    font-size:42px;
    animation:fadeDown 1s ease;
}

/* ANIMATION */
@keyframes fadeDown {
    from {opacity:0; transform:translateY(-30px);}
    to {opacity:1; transform:translateY(0);}
}
@keyframes fadeUp {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}

/* CART BUTTON */
.cart-btn {
    position:fixed;
    top:20px;
    right:20px;
    background:#ff9800;
    border:none;
    padding:12px 15px;
    border-radius:50%;
    font-size:18px;
    cursor:pointer;
    z-index:1100;
}

/* FILTERS */
.filters {
    text-align:center;
    margin:20px;
}
.filters button {
    margin:5px;
    padding:10px 15px;
    border:none;
    border-radius:20px;
    background:#333;
    color:white;
    cursor:pointer;
}
.filters button.active, .filters button:hover {
    background:#ff9800;
}

/* MENU */
.menu {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    padding:20px;
}
.card {
    background:#1e1e1e;
    border-radius:12px;
    padding:10px;
    text-align:center;
    animation:fadeUp 0.6s ease;
}
.card:hover {
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 10px 25px rgba(255,152,0,0.6);
}
.card img {
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
}

/* BUTTON */
.btn {
    background:#ff9800;
    border:none;
    padding:8px 15px;
    margin:5px;
    border-radius:5px;
    cursor:pointer;
}

/* CART */
.cart {
    position:fixed;
    right:-300px;
    top:0;
    width:260px;
    height:100%;
    background:#1f1f1f;
    padding:15px;
    overflow:auto;
    transition:0.4s;
    z-index:1000;
}
.cart.open {
    right:0;
}

.total {
    text-align:center;
    font-weight:bold;
}

/* SECTIONS */
.section {
    padding:40px 20px;
    text-align:center;
    animation:fadeUp 1s ease;
}
.section h2 {
    color:#ff9800;
}

/* FEATURES */
.features {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
}
.features div {
    background:#1e1e1e;
    padding:15px;
    border-radius:10px;
}

/* GALLERY */
.gallery {
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}
.gallery img {
    width:200px;
    height:150px;
    object-fit:cover;
    border-radius:10px;
}
.gallery img:hover {
    transform:scale(1.1);
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>☕ Brew Haven Cafe</h1>
</div>

<!-- CART BUTTON -->
<button onclick="toggleCart()" class="cart-btn">🛒</button>

<!-- FILTER -->
<div class="filters">
<button onclick="filter('all')" class="active">All</button>
<button onclick="filter('drink')">Drinks</button>
<button onclick="filter('snack')">Snacks</button>
<button onclick="filter('dessert')">Desserts</button>
<button onclick="filter('pizza')">Pizza</button>
<button onclick="filter('burger')">Burger</button>
<button onclick="filter('veg')">Veg Starters</button>
<button onclick="filter('nonveg')">Non-Veg Starters</button>
</div>

<!-- MENU -->
<div class="menu" id="menu"></div>

<!-- ABOUT -->
<section class="section">
<h2>About Brew Haven ☕</h2>
<p>Welcome to Brew Haven Cafe — your perfect place for coffee, snacks, and chill vibes.</p>
</section>

<!-- FEATURES -->
<section class="section">
<h2>Why Choose Us ⭐</h2>
<div class="features">
<div>🔥 Fresh Food</div>
<div>☕ Premium Coffee</div>
<div>🍔 Variety</div>
<div>🎶 Ambience</div>
</div>
</section>

<!-- GALLERY -->
<section class="section">
<h2>Gallery 📸</h2>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?w=600">
<img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=600">
<img src="https://images.unsplash.com/photo-1521017432531-fbd92d768814?w=600">
</div>
</section>

<!-- CONTACT -->
<section class="section">
<h2>Contact 📍</h2>
<p>Bangalore</p>
<p>+91 98765 43210</p>
<p>10 AM - 11 PM</p>
</section>

<!-- CART -->
<div class="cart">
<h3>🛒 Cart</h3>
<div id="cartItems"></div>
<div class="total">Total: ₹<span id="total">0</span></div>
<button class="btn" onclick="order()">Order</button>
</div>

<script>

const items = [

{n:"Espresso",p:120,c:"drink",img:"https://images.unsplash.com/photo-1510707577719-ae7c14805e66?w=600"},
{n:"Cappuccino",p:150,c:"drink",img:"https://images.unsplash.com/photo-1521305916504-4a1121188589?w=600"},
{n:"Latte",p:160,c:"drink",img:"https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=600"},
{n:"Cold Coffee",p:180,c:"drink",img:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600"},

{n:"French Fries",p:120,c:"snack",img:"https://images.unsplash.com/photo-1541592106381-b31e9677c0e5?w=600"},
{n:"Nuggets",p:150,c:"snack",img:"https://images.unsplash.com/photo-1603076059453-73f5939c6b4f?w=600"},

{n:"Chocolate Cake",p:200,c:"dessert",img:"https://images.unsplash.com/photo-1542838687-2834d9d3b9b6?w=600"},
{n:"Ice Cream",p:180,c:"dessert",img:"https://images.unsplash.com/photo-1499636136210-6f4ee915583e?w=600"},

{n:"Veg Pizza",p:250,c:"pizza",img:"https://images.unsplash.com/photo-1601924582975-7e9d6d8b5f5b?w=600"},
{n:"Chicken Pizza",p:300,c:"pizza",img:"https://images.unsplash.com/photo-1590947132387-155cc02f3212?w=600"},

{n:"Veg Burger",p:180,c:"burger",img:"https://images.unsplash.com/photo-1550547660-d9450f859349?w=600"},
{n:"Chicken Burger",p:220,c:"burger",img:"https://images.unsplash.com/photo-1606756790138-261d2b21cd5c?w=600"},

{n:"Paneer Tikka",p:220,c:"veg",img:"https://images.unsplash.com/photo-1601050690597-df0568f70950?w=600"},
{n:"Veg Spring Rolls",p:180,c:"veg",img:"https://images.unsplash.com/photo-1604908176997-4310e5b1f6e2?w=600"},

{n:"Chicken 65",p:250,c:"nonveg",img:"https://images.unsplash.com/photo-1604908177522-040b3cbb6e0f?w=600"},
{n:"Chicken Wings",p:280,c:"nonveg",img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092?w=600"}

];

let cart = {};

function toggleCart(){
    document.querySelector(".cart").classList.toggle("open");
}

function show(category="all"){
    let html="";
    items.forEach((i,index)=>{
        if(category==="all" || i.c===category){
            html+=`
            <div class="card">
            <img src="${i.img}" onerror="this.src='https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?w=600'">
            <h4>${i.n}</h4>
            <p>₹${i.p}</p>
            <button class="btn" onclick="add(${index})">Add</button>
            </div>`;
        }
    });
    document.getElementById("menu").innerHTML=html;
}
show();

function filter(cat){
    document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");
    show(cat);
}

function add(i){
    let item=items[i];
    cart[item.n]=(cart[item.n]||0)+1;
    updateCart();
}

function updateCart(){
    let html="",total=0;

    for(let k in cart){
        let item=items.find(x=>x.n===k);
        total+=item.p*cart[k];
        html+=`<div>${k} x ${cart[k]}</div>`;
    }

    document.getElementById("cartItems").innerHTML=html;
    document.getElementById("total").innerText=total;
}

function order(){
    alert("Order Placed Successfully!");
}

</script>

</body>
</html>
